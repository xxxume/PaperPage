<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="post-title">文章标题</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <header class="navbar">
        <div class="container">
            <h1 class="logo"><a href="index.html">PaperPage</a></h1>
            <nav class="nav-links">
                <a href="index.html">首页</a>
                <a href="#categories">分类</a>
                <a href="#tags">标签</a>
                <button id="theme-toggle" class="theme-button">🌙</button>
            </nav>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container">
        <article class="post">
            <h2 id="post-title-display"></h2>
            <div class="post-meta">
                <span id="post-date"></span>
                <span id="post-category"></span>
                <span id="post-tags"></span>
            </div>
            <div class="post-content" id="post-content"></div>
            <a href="index.html" class="back-link">← 返回首页</a>
        </article>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 PaperPage. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
